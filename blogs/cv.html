<script>
    // 🔥 ADVANCED JS (3-Year Dev Level)
    
    // 1. Mobile Menu Toggle
    const mobileToggle = document.getElementById('mobileToggle');
    const mobileSidebar = document.getElementById('mobileSidebar');
    const closeMobile = document.getElementById('closeMobile');
    const destToggle = document.getElementById('destToggle');
    const destMenu = document.getElementById('destMenu');
    
    mobileToggle?.addEventListener('click', () => {
        mobileSidebar.classList.remove('hidden');
        setTimeout(() => mobileSidebar.classList.add('translate-x-0'), 50);
    });
    
    closeMobile?.addEventListener('click', () => {
        mobileSidebar.classList.remove('translate-x-0');
        setTimeout(() => mobileSidebar.classList.add('hidden'), 400);
    });
    
    destToggle?.addEventListener('click', () => {
        destMenu.classList.toggle('hidden');
        const icon = destToggle.querySelector('i:last-child');
        icon.style.transform = destMenu.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
    });
    
    // 2. Hero Slider (Advanced)
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.slider-dot');
    let currentSlide = 0;
    let slideInterval;
    
    function nextSlide() {
        slides[currentSlide].classList.remove('active');
        dots[currentSlide].classList.remove('active');
        
        currentSlide = (currentSlide + 1) % slides.length;
        
        slides[currentSlide].classList.add('active');
        dots[currentSlide].classList.add('active');
    }
    
    function startSlider() {
        slideInterval = setInterval(nextSlide, 5000);
    }
    
    dots.forEach((dot, index) => {
        dot.addEventListener('click', () => {
            clearInterval(slideInterval);
            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');
            
            currentSlide = index;
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
            
            startSlider();
        });
    });
    
    startSlider();
    
    // 3. Scroll Animations
    const observerOptions = {
        threshold: 0.1,
        rootMargin: '0px 0px -100px 0px'
    };
    
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.animationPlayState = 'running';
                entry.target.classList.add('animate-fadeInUp');
            }
        });
    }, observerOptions);
    
    document.querySelectorAll('.animate-fadeInUp').forEach(el => {
        el.style.animationPlayState = 'paused';
        observer.observe(el);
    });
    
    // 4. Scroll to Top
    const scrollTop = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 500) {
            scrollTop.classList.remove('opacity-0', 'translate-y-10', 'invisible');
            scrollTop.classList.add('opacity-100', 'translate-y-0', 'visible');
        } else {
            scrollTop.classList.add('opacity-0', 'translate-y-10', 'invisible');
            scrollTop.classList.remove('opacity-100', 'translate-y-0', 'visible');
        }
    });
    
    scrollTop?.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    
    // 5. Parallax Hero
    window.addEventListener('scroll', () => {
        const scrolled = window.pageYOffset;
        const hero = document.querySelector('.hero-slides');
        if (hero) {
            hero.style.transform = `translateY(${scrolled * 0.3}px)`;
        }
    });
    
    // 6. Filter Functionality
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelector('.filter-btn.active').classList.remove('active');
            this.classList.add('active');
            
            // Filter logic here (add class-based filtering)
            const filter = this.textContent.toLowerCase();
            document.querySelectorAll('.card-hover').forEach(card => {
                if (filter === 'all' || card.dataset.category === filter) {
                    card.style.display = 'block';
                    card.style.animation = 'none';
                    setTimeout(() => card.classList.add('animate-fadeInUp'), 100);
                } else {
                    card.style.display = 'none';
                }
            });
        });
    });
    
    // 7. Smooth Animations on Load
    window.addEventListener('load', () => {
        document.body.classList.add('loaded');
    });
    
    // 8. Preload Critical Resources
    const preloadImages = [
        'https://uttarakhandtrips.com/blogs/wp-content/uploads/2026/02/How-to-Book-Kolkata-to-Hyderabad-Train-Tickets-Online-512x341.webp',
        'logo.png'
    ];
    
    preloadImages.forEach(src => {
        const img = new Image();
        img.src = src;
    });
</script>
