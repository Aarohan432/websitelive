<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>Modern Signup Form</title> <style> * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; } body { background: linear-gradient(135deg, 
#e0f2fe, 
#ede9fe); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; } .form-card { width: 100%; max-width: 420px; background: 
#fff; border-radius: 18px; padding: 32px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12); } .form-card h2 { margin-bottom: 10px; color: 
#111827; font-size: 28px; } .form-card p { margin-bottom: 24px; color: 
#6b7280; font-size: 14px; } .form-group { margin-bottom: 18px; } label { display: block; margin-bottom: 8px; font-size: 14px; color: 
#374151; font-weight: 600; } input { width: 100%; padding: 13px 14px; border: 1px solid 
#d1d5db; border-radius: 12px; font-size: 15px; transition: 0.2s ease; } input:focus { outline: none; border-color: 
#6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12); } .submit-btn { width: 100%; border: none; background: 
#4f46e5; color: white; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s ease; } .submit-btn:hover { background: 
#4338ca; } .message { margin-top: 16px; font-size: 14px; color: 
#059669; text-align: center; display: none; } .error { color: 
#dc2626; font-size: 13px; margin-top: 6px; } </style> </head> <body> <div class="form-card"> <h2>Create Account</h2> <p>Sign up with your details below.</p> <form id="signupForm"> <div class="form-group"> <label for="email">Email</label> <input type="email" id="email" placeholder="you@example.com" required /> <div class="error" id="emailError"></div> </div> <div class="form-group"> <label for="password">Password</label> <input type="password" id="password" placeholder="Enter password" required /> <div class="error" id="passwordError"></div> </div> <div class="form-group"> <label for="phone">Phone</label> <input type="tel" id="phone" placeholder="Enter phone number" required /> <div class="error" id="phoneError"></div> </div> <div class="form-group"> <label for="customField">Custom Field</label> <input type="text" id="customField" placeholder="Enter custom value" required /> <div class="error" id="customError"></div> </div> <button type="submit" class="submit-btn">Sign Up</button> <div class="message" id="successMessage">Signup saved successfully.</div> </form> </div> <script> const form = document.getElementById("signupForm"); const successMessage = document.getElementById("successMessage"); form.addEventListener("submit", function (e) { e.preventDefault(); document.getElementById("emailError").textContent = ""; document.getElementById("passwordError").textContent = ""; document.getElementById("phoneError").textContent = ""; document.getElementById("customError").textContent = ""; successMessage.style.display = "none"; const email = document.getElementById("email").value.trim(); const password = document.getElementById("password").value.trim(); const phone = document.getElementById("phone").value.trim(); const customField = document.getElementById("customField").value.trim(); let isValid = true; if (!email.includes("@")) { document.getElementById("emailError").textContent = "Enter a valid email."; isValid = false; } if (password.length < 6) { document.getElementById("passwordError").textContent = "Password must be at least 6 characters."; isValid = false; } if (phone.length < 7) { document.getElementById("phoneError").textContent = "Enter a valid phone number."; isValid = false; } if (customField === "") { document.getElementById("customError").textContent = "This field is required."; isValid = false; } if (!isValid) return; const userData = { email, password, phone, customField, createdAt: new Date().toISOString() }; const existingUsers = JSON.parse(localStorage.getItem("signupUsers")) || []; existingUsers.push(userData); localStorage.setItem("signupUsers", JSON.stringify(existingUsers)); successMessage.style.display = "block"; form.reset(); console.log("Saved users:", existingUsers); }); </script> </body> </html>
